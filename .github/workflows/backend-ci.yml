name: Backend CI

on:
  push:
    paths:
      - 'intentra-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'intentra-backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intentra-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest -q
